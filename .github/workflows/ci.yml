name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: pytest (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Run pytest
        run: python -m pytest tests/validator tests/context_budget tests/status_board tests/runtime -v

  smoke-bash:
    name: bash smoke (${{ matrix.os }})
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bats (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Install bats (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install bats-core
      - name: Make runner scripts executable
        run: chmod +x runtime/*.sh tests/run-smoke.sh
      - name: Run portable smoke runner
        run: ./tests/run-smoke.sh
      - name: Run bats suite
        run: bats tests/bats

  smoke-powershell:
    name: PowerShell smoke (windows)
    needs: unit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Direct validator CLI on golden
        shell: pwsh
        run: python runtime\validator\cli.py kb\tasks\task-001\design.md
      - name: PS1 runner against golden
        shell: pwsh
        run: .\runtime\claude-implement.ps1 task-001
      - name: Ensure Pester 5
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable Pester | Where-Object { $_.Version -ge [version]'5.0.0' })) {
            Set-PSRepository PSGallery -InstallationPolicy Trusted
            Install-Module Pester -MinimumVersion 5.0.0 -Force -Scope CurrentUser
          }
      - name: Run Pester suite (runner parity)
        shell: pwsh
        run: Invoke-Pester tests/pester -Output Detailed -CI

  governance:
    name: governance enforcement (status board + done-gate)
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Status board has no drift
        run: python runtime/generate-status.py --check
      - name: Done-gate for completed tasks
        run: |
          set -e
          for f in kb/artifacts/*-summary.md; do
            [ -f "$f" ] || continue
            tid="$(basename "$f" -summary.md)"
            if grep -qE '^> *Status: *done' "$f"; then
              echo "check-done: $tid"
              python runtime/validator/cli.py --check-done "$tid"
            fi
          done
